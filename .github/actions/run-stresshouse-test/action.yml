name: Run Stresshouse Test
description: Run a stresshouse plugin test with automatic retry on failure

inputs:
  name:
    description: Human-readable test name (used in log messages)
    required: true
  entrypoint:
    description: Binary path inside the stresshouse image (e.g. /app/pg_ubi_provision_smoke)
    required: true
  plugin_config:
    description: JSON plugin config string
    required: true
  image:
    description: Stresshouse Docker image name
    required: true
  network:
    description: Docker network to attach to
    required: true
  api_host:
    description: IP address of the API host (for --add-host)
    required: true
  log_dir:
    description: Directory for log files
    required: false
    default: /tmp/ci-logs
  timeout:
    description: Timeout in minutes per attempt
    required: false
    default: "20"
  max_attempts:
    description: Maximum number of attempts (1 = no retry)
    required: false
    default: "2"

outputs:
  outcome:
    description: "success or failure"
    value: ${{ steps.result.outputs.outcome }}
  log_file:
    description: Path to the final log file
    value: ${{ steps.result.outputs.log_file }}

runs:
  using: composite
  steps:
    - name: ${{ inputs.name }}
      id: result
      shell: bash
      env:
        TEST_NAME: ${{ inputs.name }}
        ENTRYPOINT: ${{ inputs.entrypoint }}
        PLUGIN_CONFIG: ${{ inputs.plugin_config }}
        IMAGE: ${{ inputs.image }}
        NETWORK: ${{ inputs.network }}
        API_HOST: ${{ inputs.api_host }}
        LOG_DIR: ${{ inputs.log_dir }}
        TIMEOUT_MIN: ${{ inputs.timeout }}
        MAX_ATTEMPTS: ${{ inputs.max_attempts }}
      run: |
        EXIT_CODE=0
        ./.devcontainer/scripts/run-stresshouse-test.sh || EXIT_CODE=$?

        LOG_NAME=$(echo "$TEST_NAME" | tr ' A-Z' '-a-z' | tr -cs 'a-z0-9-' '-')
        FINAL_LOG="$LOG_DIR/${LOG_NAME}.log"
        echo "::group::${TEST_NAME} output"
        for f in "$LOG_DIR/${LOG_NAME}.log" "$LOG_DIR/${LOG_NAME}-retry"*.log; do
          [ -f "$f" ] || continue
          echo "--- $f ---"
          cat "$f"
          FINAL_LOG="$f"
        done
        echo "::endgroup::"

        if [ $EXIT_CODE -eq 0 ]; then
          echo "✅ ${TEST_NAME} passed"
          echo "outcome=success" >> "$GITHUB_OUTPUT"
        else
          echo "❌ ${TEST_NAME} failed (exit $EXIT_CODE)"
          echo "outcome=failure" >> "$GITHUB_OUTPUT"
        fi
        echo "log_file=$FINAL_LOG" >> "$GITHUB_OUTPUT"
        exit $EXIT_CODE
